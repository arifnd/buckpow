services:
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY?SECRET_KEY is required}
      DEVICE_ONLINE_TIMEOUT: "30"
      DEFAULT_SAMPLING_INTERVAL: "1"
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    env_file:
      - .env

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: buckpow
      POSTGRES_PASSWORD: buckpow
      POSTGRES_DB: buckpow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buckpow -d buckpow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
