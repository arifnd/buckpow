name: Docker Prerelease

on:
  push:
    tags:
      - 'v*-*'

env:
  IMAGE_NAME: arifnd/buckpow

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"

      - name: Set up Python
        run: uv python install 3.12

      - name: Create Virtual Environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -r requirements.txt pytest-xdist

      - name: Run Tests
        run: uv run pytest tests/ -v --tb=short -n auto --durations=5 --cov=app --cov-report=term-missing
        env:
          SECRET_KEY: test-secret-key-that-is-long-enough-for-hmac-sha256

  docker-build-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:test .

      - name: Smoke test
        run: |
          docker run -d --name test-container -p 8000:8000 \
            -e SECRET_KEY=test-secret-key-that-is-long-enough-for-hmac-sha256 \
            ${{ env.IMAGE_NAME }}:test
          sleep 5
          curl -sf http://localhost:8000/api/v1/health || exit 1
          docker stop test-container

  docker:
    needs: docker-build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
