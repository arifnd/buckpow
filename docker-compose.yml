services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: buckpow
      POSTGRES_PASSWORD: buckpow
      POSTGRES_DB: buckpow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buckpow -d buckpow"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://buckpow:buckpow@db:5432/buckpow
      SECRET_KEY: ${SECRET_KEY?SECRET_KEY is required}
      DEVICE_ONLINE_TIMEOUT: "30"
      DEFAULT_SAMPLING_INTERVAL: "1"
      LOG_LEVEL: info
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
