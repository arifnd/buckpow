services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bakpow
      POSTGRES_PASSWORD: bakpow
      POSTGRES_DB: bakpow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakpow -d bakpow"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://bakpow:bakpow@db:5432/bakpow
      SECRET_KEY: ${SECRET_KEY?SECRET_KEY is required}
      DEVICE_ONLINE_TIMEOUT: "30"
      DEFAULT_SAMPLING_INTERVAL: "1"
      LOG_LEVEL: info

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
