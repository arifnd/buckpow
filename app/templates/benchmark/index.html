{% extends "base.html" %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 py-6" hx-boost="false">
  <h1 class="text-xl font-bold mb-4">Benchmark Comparison</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
    <div>
      <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Session A</label>
      <select id="session-a" class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300">
        <option value="">Select a finished session</option>
      </select>
    </div>
    <div>
      <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Session B</label>
      <select id="session-b" class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300">
        <option value="">Select a finished session</option>
      </select>
    </div>
  </div>

  <div class="flex items-center gap-2 mb-6">
    <button id="compare-btn" class="px-4 py-1.5 rounded text-sm font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>Compare</button>
    <span id="compare-status" class="text-sm text-gray-500 dark:text-gray-400"></span>
  </div>

  <div id="results-section" class="hidden">
    <div class="mb-6">
      <table class="w-full border-collapse">
        <thead>
          <tr class="border-b border-gray-200 dark:border-gray-800 text-gray-500 dark:text-gray-400">
            <th class="text-left py-2 px-3 font-medium">Metric</th>
            <th class="text-left py-2 px-3 font-medium" id="header-a">Session A</th>
            <th class="text-left py-2 px-3 font-medium" id="header-b">Session B</th>
          </tr>
        </thead>
        <tbody id="comparison-tbody">
        </tbody>
      </table>
    </div>

    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg p-4">
      <div class="flex items-center gap-2 mb-3">
        <h6 class="text-base text-gray-500 dark:text-gray-400 font-medium">Power Overlay</h6>
      </div>
      <div class="chart-container" style="position:relative;height:300px">
        <canvas id="benchmarkChart"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/benchmark.js') }}"></script>
{% endblock %}
