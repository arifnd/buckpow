{% extends "base.html" %}

{% block content %}
<div class="flex justify-between items-center mb-4">
  <h2 class="text-xl font-semibold">Projects</h2>
  <button class="inline-flex items-center px-3 py-1.5 rounded text-sm font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors" id="create-project-btn">Create Project</button>
</div>

<div class="bg-[var(--surface)] border border-[var(--border)] rounded-lg">
  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-[var(--border)] text-[var(--muted)]">
          <th class="text-left py-2 px-3 font-medium">ID</th>
          <th class="text-left py-2 px-3 font-medium">Name</th>
          <th class="text-left py-2 px-3 font-medium">Description</th>
          <th class="text-left py-2 px-3 font-medium">Owner</th>
          <th class="text-center py-2 px-3 font-medium">Devices</th>
          <th class="text-center py-2 px-3 font-medium">Sessions</th>
          <th class="text-left py-2 px-3 font-medium">Created</th>
          <th class="text-right py-2 px-3 font-medium">Actions</th>
        </tr>
      </thead>
      <tbody id="projects-body"></tbody>
    </table>
  </div>
  <nav class="mt-4 pb-4">
    <ul class="flex items-center justify-center gap-1" id="projects-pagination"></ul>
  </nav>
</div>

<div id="project-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">
  <div class="bg-[var(--surface)] border border-[var(--border)] rounded-lg shadow-xl p-6 max-w-lg w-full mx-4">
    <h3 class="text-base font-semibold mb-4" id="project-modal-title">Create Project</h3>
    <form id="project-form">
      <input type="hidden" name="id" id="project-id">
      <div class="mb-4">
        <label class="block text-sm text-[var(--muted)] mb-1">Project Name</label>
        <input type="text" name="name" id="field-project-name" required
               class="w-full px-3 py-1.5 rounded text-sm bg-[var(--body-bg)] border border-[#30363d] text-[var(--body-text)] focus:outline-none focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff]">
      </div>
      <div class="mb-4">
        <label class="block text-sm text-[var(--muted)] mb-1">Description</label>
        <textarea name="description" id="field-project-desc" rows="3"
                  class="w-full px-3 py-1.5 rounded text-sm bg-[var(--body-bg)] border border-[#30363d] text-[var(--body-text)] focus:outline-none focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff]"></textarea>
      </div>
      <div class="flex justify-end gap-2">
        <button type="button" class="px-4 py-1.5 rounded text-sm font-medium bg-gray-600 text-white hover:bg-gray-500 transition-colors" id="project-modal-cancel">Cancel</button>
        <button type="submit" class="px-4 py-1.5 rounded text-sm font-medium bg-[#1f6feb] text-white hover:bg-[#388bfd] transition-colors">Save</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
var editingProjectId = null;
var _initialized = false;

function loadProjects(page) {
  page = page || 1;
  fetch('/api/v1/projects?page=' + page + '&per_page=10')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var tbody = document.getElementById('projects-body');
      tbody.innerHTML = data.projects.map(function(p) {
        return '<tr class="border-b border-[var(--border)] hover:bg-[var(--hover)]">' +
          '<td class="py-2 px-3">' + p.id + '</td>' +
          '<td class="py-2 px-3 font-medium">' + p.name + '</td>' +
          '<td class="py-2 px-3 text-[var(--muted)]">' + (p.description || '—') + '</td>' +
          '<td class="py-2 px-3">' + (p.owner_name || '—') + '</td>' +
          '<td class="py-2 px-3 text-center">' + (p.device_count || 0) + '</td>' +
          '<td class="py-2 px-3 text-center">' + (p.session_count || 0) + '</td>' +
          '<td class="py-2 px-3">' + (p.created_at ? new Date(p.created_at).toLocaleString() : '—') + '</td>' +
          '<td class="py-2 px-3 text-right">' +
            '<button class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-gray-600 text-white hover:bg-gray-500 transition-colors" onclick="openProjectModal(' + p.id + ')">Edit</button> ' +
            '<button class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-red-600 text-white hover:bg-red-500 transition-colors ml-1" onclick="deleteProject(' + p.id + ')">Delete</button>' +
          '</td>' +
        '</tr>';
      }).join('');

      var pagination = document.getElementById('projects-pagination');
      var p = data.page, total = data.pages;
      pagination.parentElement.style.display = total <= 1 ? 'none' : '';
      var html = '<li><a class="flex items-center justify-center w-7 h-7 rounded text-xs ' + (p <= 1 ? 'text-[#484f58] pointer-events-none' : 'text-[#c9d1d9] hover:bg-[#30363d]') + ' border border-[#30363d] transition-colors" href="#" onclick="loadProjects(' + (p - 1) + '); return false;">&laquo;</a></li>';
      var pages = new Set([1, total]);
      for (var i = Math.max(2, p - 2); i <= Math.min(total - 1, p + 2); i++) pages.add(i);
      var arr = [];
      pages.forEach(function(n) { arr.push(n); });
      arr.sort(function(a, b) { return a - b; });
      arr.forEach(function(n, i, a) {
        if (i > 0 && n - a[i - 1] > 1) html += '<li><span class="flex items-center justify-center w-7 h-7 text-xs text-[#484f58]">&hellip;</span></li>';
        html += '<li><a class="flex items-center justify-center w-7 h-7 rounded text-xs border border-[#30363d] transition-colors ' + (n === p ? 'bg-[#1f6feb] border-[#1f6feb] text-white' : 'text-[#c9d1d9] hover:bg-[#30363d]') + '" href="#" onclick="loadProjects(' + n + '); return false;">' + n + '</a></li>';
      });
      html += '<li><a class="flex items-center justify-center w-7 h-7 rounded text-xs ' + (p >= total ? 'text-[#484f58] pointer-events-none' : 'text-[#c9d1d9] hover:bg-[#30363d]') + ' border border-[#30363d] transition-colors" href="#" onclick="loadProjects(' + (p + 1) + '); return false;">&raquo;</a></li>';
      pagination.innerHTML = html;
    });
}

function showProjectModal() {
  var modal = document.getElementById('project-modal');
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}

function hideProjectModal() {
  var modal = document.getElementById('project-modal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}

function openProjectModal(id) {
  editingProjectId = id;
  document.getElementById('project-modal-title').textContent = 'Edit Project';
  fetch('/api/v1/projects/' + id)
    .then(function(r) { return r.json(); })
    .then(function(p) {
      document.getElementById('project-id').value = p.id;
      document.getElementById('field-project-name').value = p.name;
      document.getElementById('field-project-desc').value = p.description || '';
      showProjectModal();
    });
}

function deleteProject(id) {
  if (!confirmDialog('Delete this project?')) return;
  fetch('/api/v1/projects/' + id, {method: 'DELETE'}).then(function() { loadProjects(); });
}

function initProjects() {
  if (_initialized) return;
  _initialized = true;
  loadProjects();
  document.getElementById('create-project-btn').addEventListener('click', function() {
    editingProjectId = null;
    document.getElementById('project-modal-title').textContent = 'Create Project';
    document.getElementById('project-form').reset();
    document.getElementById('project-id').value = '';
    showProjectModal();
  });
  document.getElementById('project-modal-cancel').addEventListener('click', hideProjectModal);
  document.getElementById('project-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var data = {
      name: document.getElementById('field-project-name').value,
      description: document.getElementById('field-project-desc').value,
    };
    var url, method;
    if (editingProjectId) {
      url = '/api/v1/projects/' + editingProjectId;
      method = 'PUT';
    } else {
      url = '/api/v1/projects';
      method = 'POST';
    }
    fetch(url, {
      method: method,
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data),
    }).then(function(res) {
      if (res.ok) {
        hideProjectModal();
        loadProjects();
      } else {
        res.json().then(function(err) { alert('Error: ' + (err.error || 'Unknown error')); });
      }
    });
  });
}

initProjects();
</script>
{% endblock %}
