{% extends "base.html" %}

{% block content %}
<h2>Measurements</h2>

<div class="card border-0 bg-dark mt-3">
  <div class="card-body">
    <div class="table-responsive">
      <table class="table table-dark table-sm mb-0" id="measurements-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Device ID</th>
            <th>Session ID</th>
            <th>Bus Voltage</th>
            <th>Shunt Voltage</th>
            <th>Load Voltage</th>
            <th>Current</th>
            <th>Power</th>
            <th>Energy</th>
            <th>Timestamp</th>
          </tr>
        </thead>
        <tbody id="measurements-body"></tbody>
      </table>
    </div>
    <nav class="mt-3">
      <ul class="pagination pagination-sm justify-content-center" id="pagination"></ul>
    </nav>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let currentPage = 1;

async function loadMeasurements(page = 1) {
  const res = await fetch(`/api/v1/measurements?page=${page}&per_page=50`);
  const data = await res.json();

  const tbody = document.getElementById('measurements-body');
  tbody.innerHTML = data.measurements.map(m => `<tr>
    <td>${m.id}</td>
    <td>${m.device_id}</td>
    <td>${m.session_id || '—'}</td>
    <td>${m.bus_voltage.toFixed(3)}</td>
    <td>${m.shunt_voltage.toFixed(3)}</td>
    <td>${m.load_voltage.toFixed(3)}</td>
    <td>${(m.current * 1000).toFixed(2)} mA</td>
    <td>${(m.power * 1000).toFixed(2)} mW</td>
    <td>${m.energy.toFixed(6)}</td>
    <td>${m.created_at ? new Date(m.created_at).toLocaleString() : '—'}</td>
  </tr>`).join('');

  const pagination = document.getElementById('pagination');
  let html = '';
  for (let p = 1; p <= data.pages; p++) {
    html += `<li class="page-item ${p === data.page ? 'active' : ''}">
      <a class="page-link" href="#" onclick="loadMeasurements(${p}); return false;">${p}</a>
    </li>`;
  }
  pagination.innerHTML = html;
  currentPage = data.page;
}

document.addEventListener('DOMContentLoaded', () => loadMeasurements());
</script>
{% endblock %}
