{% extends "base.html" %}

{% block content %}
<div class="flex justify-between items-center mb-4">
  <h2 class="text-xl font-semibold">Sessions</h2>
  <button class="inline-flex items-center px-3 py-1.5 rounded text-sm font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors" id="create-session-btn">Create Session</button>
</div>

<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg">
  <div class="">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-gray-200 dark:border-gray-800 text-gray-500 dark:text-gray-400">
          <th class="text-left py-2 px-3 font-medium">Name</th>
          <th class="text-left py-2 px-3 font-medium">Device ID</th>
          <th class="text-left py-2 px-3 font-medium">Target Device</th>
          <th class="text-left py-2 px-3 font-medium">Project</th>
          <th class="text-left py-2 px-3 font-medium">Status</th>
          <th class="text-left py-2 px-3 font-medium">Duration</th>
          <th class="text-right py-2 px-3 font-medium">AVG Power</th>
          <th class="text-right py-2 px-3 font-medium">Energy</th>
          <th class="text-right py-2 px-3 font-medium">Actions</th>
        </tr>
      </thead>
      <tbody id="sessions-body"></tbody>
    </table>
  </div>
  <nav class="mt-4 pb-4">
    <ul class="flex items-center justify-center gap-1" id="sessions-pagination"></ul>
  </nav>
</div>

<div id="session-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">
  <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg shadow-xl p-6 max-w-lg w-full mx-4">
    <h3 class="text-base font-semibold mb-4" id="session-modal-title">Create Session</h3>
    <form id="session-form">
      <input type="hidden" name="id" id="session-id">
      <div class="mb-4">
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Session Name</label>
        <input type="text" name="name" id="field-session-name" required
               class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
      </div>
      <div class="mb-4">
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Device</label>
        <select name="device_id" id="field-session-device"
                class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
          <option value="">Select device</option>
        </select>
      </div>
      <div class="mb-4">
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Target Device</label>
        <input type="text" name="target_device" id="field-target-device"
               class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Optional: the device being benchmarked.</p>
      </div>
      <div class="mb-4">
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Description</label>
        <textarea name="description" id="field-session-desc" rows="2"
                  class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400"></textarea>
      </div>
      <div class="mb-4">
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Project</label>
        <select name="project_id" id="field-session-project"
                class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
          <option value="">No project</option>
        </select>
      </div>
      <div class="flex justify-end gap-2">
        <button type="button" class="px-4 py-1.5 rounded text-sm font-medium bg-gray-600 text-white hover:bg-gray-500 transition-colors" id="session-modal-cancel">Cancel</button>
        <button type="submit" class="px-4 py-1.5 rounded text-sm font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors">Save</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
var editingSessionId = null;
var deviceOpts = [];
var sessionProjectOpts = [];
var allDeviceOpts = [];
var _initialized = false;

function statusBadge(status) {
  const map = {draft: 'bg-gray-400', running: 'bg-green-500', finished: 'bg-blue-600'};
  return `<span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-xs font-medium text-white ${map[status] || 'bg-gray-400'}">${status}</span>`;
}

function formatDuration(startedAt, endedAt, status) {
  if (status === 'draft' || !startedAt) return '-';
  var start = new Date(startedAt);
  var end = endedAt ? new Date(endedAt) : new Date();
  var diffMs = end - start;
  if (diffMs < 0) diffMs = 0;
  var totalMin = Math.floor(diffMs / 60000);
  var d = Math.floor(totalMin / 1440);
  var h = Math.floor((totalMin % 1440) / 60);
  var m = totalMin % 60;
  return d + 'd ' + h + 'h ' + m + 'm';
}

async function loadSessions(page) {
  page = page || 1;
  const res = await fetch('/api/v1/sessions?page=' + page + '&per_page=10');
  const data = await res.json();
  var busyDevices = {};
  data.sessions.forEach(function(s) {
    if (s.status === 'running') busyDevices[s.device_id] = s.id;
  });
  const tbody = document.getElementById('sessions-body');
  tbody.innerHTML = data.sessions.map(s => {
    var busyId = busyDevices[s.device_id];
    var startDisabled = s.status === 'draft' && busyId && busyId !== s.id;
    return `<tr class="border-b border-gray-200 dark:border-gray-800 hover:bg-gray-100 dark:hover:bg-gray-800">
      <td class="py-2 px-3 font-medium">${s.name}</td>
      <td class="py-2 px-3">${s.device_name || s.device_id}</td>
      <td class="py-2 px-3">${s.target_device || '-'}</td>
      <td class="py-2 px-3">${s.project_name || '-'}</td>
      <td class="py-2 px-3">${statusBadge(s.status)}</td>
      <td class="py-2 px-3" title="${s.started_at || ''}${s.ended_at ? ' → ' + s.ended_at : ''}">${formatDuration(s.started_at, s.ended_at, s.status)}</td>
      <td class="py-2 px-3 text-right">${fmtPower(s.avg_power)}</td>
      <td class="py-2 px-3 text-right">${fmtEnergy(s.total_energy)}</td>
      <td class="py-2 px-3 text-right">
        ${s.status === 'draft' ? `<button class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-green-600 text-white hover:bg-green-500 transition-colors${startDisabled ? ' opacity-50 cursor-not-allowed' : ''}" onclick="${startDisabled ? '' : 'startSession(' + s.id + ')'}"${startDisabled ? ' title="Another session is already running"' : ''}>Start</button>` : ''}
        ${s.status === 'running' ? `<button class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-yellow-500 text-white hover:bg-yellow-400 transition-colors" onclick="stopSession(${s.id})">Stop</button>` : ''}
        ${s.status === 'finished' ? `<a href="/api/v1/measurements/export/csv?session_id=${s.id}" class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors">Report</a>` : ''}
        <a class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-gray-600 text-white hover:bg-gray-500 transition-colors ml-1" href="javascript:void(0)" onclick="window.location.href='/sessions/'+${s.id}">Detail</a>
      </td>
    </tr>`;
  }).join('');

  const pagination = document.getElementById('sessions-pagination');
  const p = data.page, total = data.pages;
  pagination.parentElement.style.display = total <= 1 ? 'none' : '';
  let html = `<li><a class="flex items-center justify-center w-7 h-7 rounded text-xs ${p <= 1 ? 'text-gray-500 pointer-events-none' : 'text-gray-900 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800'} border border-gray-300 dark:border-gray-700 transition-colors" href="#" onclick="loadSessions(${p - 1}); return false;">&laquo;</a></li>`;
  let pages = new Set([1, total]);
  for (let i = Math.max(2, p - 2); i <= Math.min(total - 1, p + 2); i++) pages.add(i);
  [...pages].sort((a, b) => a - b).forEach((n, i, arr) => {
    if (i > 0 && n - arr[i - 1] > 1) html += '<li><span class="flex items-center justify-center w-7 h-7 text-xs text-gray-500">&hellip;</span></li>';
    html += `<li><a class="flex items-center justify-center w-7 h-7 rounded text-xs border border-gray-300 dark:border-gray-700 transition-colors ${n === p ? 'bg-blue-600 border-blue-600 text-white' : 'text-gray-900 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800'}" href="#" onclick="loadSessions(${n}); return false;">${n}</a></li>`;
  });
  html += `<li><a class="flex items-center justify-center w-7 h-7 rounded text-xs ${p >= total ? 'text-gray-500 pointer-events-none' : 'text-gray-900 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800'} border border-gray-300 dark:border-gray-700 transition-colors" href="#" onclick="loadSessions(${p + 1}); return false;">&raquo;</a></li>`;
  pagination.innerHTML = html;
}

function showSessionModal() {
  const modal = document.getElementById('session-modal');
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}

function hideSessionModal() {
  const modal = document.getElementById('session-modal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}

async function populateSessionProjectSelect(selectedId) {
  const sel = document.getElementById('field-session-project');
  sel.innerHTML = '<option value="">No project</option>';
  if (sessionProjectOpts.length === 0) {
    const res = await fetch('/api/v1/projects?page=0');
    sessionProjectOpts = await res.json();
  }
  sessionProjectOpts.forEach(function(p) {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.name;
    if (selectedId && p.id === selectedId) opt.selected = true;
    sel.appendChild(opt);
  });
}

async function populateDeviceSelect(selectedId) {
  const sel = document.getElementById('field-session-device');
  sel.innerHTML = '<option value="">Select device</option>';
  if (allDeviceOpts.length === 0) {
    const [devRes, sessRes] = await Promise.all([
      fetch('/api/v1/devices?page=0'),
      fetch('/api/v1/sessions?page=0'),
    ]);
    allDeviceOpts = await devRes.json();
    var sessions = await sessRes.json();
    var busyDeviceIds = new Set(sessions.filter(s => s.status === 'running').map(s => s.device_id));
    deviceOpts = allDeviceOpts.filter(d => !busyDeviceIds.has(d.id));
  }
  var list = selectedId ? allDeviceOpts : deviceOpts;
  list.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = d.alias || d.device_id;
    if (selectedId && d.id === selectedId) opt.selected = true;
    sel.appendChild(opt);
  });
}

async function openSessionModal(id) {
  editingSessionId = id;
  document.getElementById('session-modal-title').textContent = 'Edit Session';
  const [s, _] = await Promise.all([
    fetch('/api/v1/sessions/' + id).then(r => r.json()),
    populateDeviceSelect(),
    populateSessionProjectSelect(),
  ]);
  document.getElementById('session-id').value = s.id;
  document.getElementById('field-session-name').value = s.name;
  document.getElementById('field-target-device').value = s.target_device || '';
  document.getElementById('field-session-desc').value = s.description || '';
  const sel = document.getElementById('field-session-device');
  sel.value = s.device_id;
  sel.setAttribute('disabled', true);
  var projSel = document.getElementById('field-session-project');
  projSel.value = s.project_id || '';
  showSessionModal();
}

async function startSession(id) {
  await fetch('/api/v1/sessions/' + id + '/start', {method: 'POST'});
  loadSessions();
}

async function stopSession(id) {
  await fetch('/api/v1/sessions/' + id + '/stop', {method: 'POST'});
  loadSessions();
}

async function deleteSession(id) {
  if (!await confirmDialog('Delete this session?')) return;
  await fetch('/api/v1/sessions/' + id, {method: 'DELETE'});
  loadSessions();
}

function initSessions() {
  if (_initialized) return;
  _initialized = true;
  loadSessions();
  document.getElementById('create-session-btn').addEventListener('click', async () => {
    editingSessionId = null;
    allDeviceOpts = [];
    deviceOpts = [];
    document.getElementById('session-modal-title').textContent = 'Create Session';
    document.getElementById('session-form').reset();
    document.getElementById('session-id').value = '';
    document.getElementById('field-session-device').removeAttribute('disabled');
    await Promise.all([populateDeviceSelect(), populateSessionProjectSelect()]);
    showSessionModal();
  });
  document.getElementById('session-modal-cancel').addEventListener('click', hideSessionModal);
  document.getElementById('session-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      name: document.getElementById('field-session-name').value,
      device_id: parseInt(document.getElementById('field-session-device').value),
      target_device: document.getElementById('field-target-device').value,
      description: document.getElementById('field-session-desc').value,
      project_id: parseInt(document.getElementById('field-session-project').value) || null,
    };
    let res;
    if (editingSessionId) {
      delete data.device_id;
      res = await fetch('/api/v1/sessions/' + editingSessionId, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data),
      });
    } else {
      res = await fetch('/api/v1/sessions', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data),
      });
    }
    if (res.ok) {
      hideSessionModal();
      loadSessions();
    } else {
      const err = await res.json();
      alert('Error: ' + (err.error || 'Unknown error'));
    }
  });
}

initSessions();
</script>
{% endblock %}
