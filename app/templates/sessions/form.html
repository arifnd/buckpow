{% extends "base.html" %}

{% block content %}
<h2 class="text-xl font-semibold mb-4">{% if session %}Edit Session{% else %}Create Session{% endif %}</h2>

<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg p-4">
  <form id="session-form" class="max-w-lg" hx-boost="false">
    <div class="mb-4">
      <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Session Name</label>
      <input type="text" name="name" value="{{ session.name if session else '' }}" required
             class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
    </div>
    <div class="mb-4">
      <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Device</label>
      <select name="device_id" {% if session %}disabled{% endif %}
              class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
        {% for d in devices %}
        <option value="{{ d.id }}" {% if session and session.device_id == d.id %}selected{% endif %}>
          {{ d.alias or d.device_id }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-4">
      <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Target Device</label>
      <input type="text" name="target_device" value="{{ session.target_device if session else '' }}"
             class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
      <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Optional: the device being benchmarked.</p>
    </div>
    <div class="mb-4">
      <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Description</label>
      <textarea name="description" rows="2"
                class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">{{ session.description if session else '' }}</textarea>
    </div>
    <div class="mb-4">
      <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Project</label>
      <select name="project_id"
              class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
        <option value="">No project</option>
        {% for p in projects %}
        <option value="{{ p.id }}" {% if session and session.project_id == p.id %}selected{% endif %}>{{ p.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="flex gap-2">
      <button type="submit" class="px-4 py-1.5 rounded text-sm font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors">Save</button>
      <a href="/sessions" class="inline-flex items-center px-4 py-1.5 rounded text-sm font-medium bg-gray-600 text-white hover:bg-gray-500 transition-colors">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('session-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const data = Object.fromEntries(new FormData(form).entries());
  data.device_id = parseInt(data.device_id);

  {% if session %}
  const res = await fetch('/api/v1/sessions/{{ session.id }}', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  });
  {% else %}
  const res = await fetch('/api/v1/sessions', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  });
  {% endif %}

  if (res.ok) {
    htmx.ajax('GET', '/sessions', { target: '#main-content', pushUrl: true, select: '#main-content' });
  } else {
    const err = await res.json();
    alert('Error: ' + (err.error || 'Unknown error'));
  }
});
</script>
{% endblock %}
