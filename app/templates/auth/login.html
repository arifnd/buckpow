{% extends "base.html" %}

{% block content %}
<div class="flex-1 flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-[var(--surface)] border border-[var(--border)] rounded-lg shadow-xl p-6">
      <h2 class="text-xl font-semibold text-center mb-6">Sign in to BuckPow</h2>
      <form id="login-form" hx-boost="false" class="space-y-4">
        <div>
          <label class="block text-sm text-[var(--muted)] mb-1" for="email">Email</label>
          <input type="email" name="email" id="email" required autocomplete="email"
                 class="w-full px-3 py-1.5 rounded text-sm bg-[var(--body-bg)] border border-[#30363d] text-[var(--body-text)] focus:outline-none focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff]">
        </div>
        <div>
          <label class="block text-sm text-[var(--muted)] mb-1" for="password">Password</label>
          <div class="relative">
            <input type="password" name="password" id="password" required autocomplete="current-password"
                   class="w-full px-3 py-1.5 pr-9 rounded text-sm bg-[var(--body-bg)] border border-[#30363d] text-[var(--body-text)] focus:outline-none focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff]">
            <button type="button" id="password-toggle" tabindex="-1"
                    class="absolute right-2 top-1/2 -translate-y-1/2 text-[var(--muted)] hover:text-[var(--body-text)] transition-colors">
              <iconify-icon icon="mdi:eye" class="text-lg"></iconify-icon>
            </button>
          </div>
        </div>
        <input type="hidden" id="next" value="">
        <div id="login-error" class="text-sm text-red-500 hidden"></div>
        <button type="submit" class="w-full px-4 py-1.5 rounded text-sm font-medium bg-[#1f6feb] text-white hover:bg-[#388bfd] transition-colors">
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  document.getElementById('next').value = params.get('next') || '/';

  document.getElementById('password-toggle').addEventListener('click', function() {
    var inp = document.getElementById('password');
    var icon = this.querySelector('iconify-icon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.setAttribute('icon', 'mdi:eye-off');
    } else {
      inp.type = 'password';
      icon.setAttribute('icon', 'mdi:eye');
    }
  });

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var errorEl = document.getElementById('login-error');
    errorEl.classList.add('hidden');
    try {
      var res = await fetch('/api/v1/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      if (res.ok) {
        window.location.href = document.getElementById('next').value;
      } else {
        var data = await res.json();
        errorEl.textContent = data.error || 'Login failed';
        errorEl.classList.remove('hidden');
      }
    } catch (err) {
      errorEl.textContent = 'Network error';
      errorEl.classList.remove('hidden');
    }
  });
})();
</script>
{% endblock %}
