{% extends "base.html" %}

{% block content %}
<div class="w-full max-w-sm">
    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg shadow-xl p-6">
      <h2 class="text-xl font-semibold text-center mb-2">Sign in to {{ brand_name }}</h2>
      <div id="login-error" class="text-sm text-red-500 text-center mb-4 hidden"></div>
      <form id="login-form" hx-boost="false" novalidate class="space-y-4">
        <div>
          <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1" for="email">Email</label>
          <input type="email" name="email" id="email" autocomplete="email"
                 class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
          <div id="email-error" class="text-xs text-red-500 mt-1 hidden"></div>
        </div>
        <div>
          <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1" for="password">Password</label>
          <div class="relative">
            <input type="password" name="password" id="password" autocomplete="current-password"
                   class="w-full px-3 py-1.5 pr-9 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
            <button type="button" id="password-toggle" tabindex="-1"
                    class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:text-gray-300 transition-colors">
              <iconify-icon icon="mdi:eye" class="text-lg"></iconify-icon>
            </button>
          </div>
          <div id="password-error" class="text-xs text-red-500 mt-1 hidden"></div>
        </div>
        <input type="hidden" id="next" value="">
        <button type="submit" class="w-full px-4 py-1.5 rounded text-sm font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors">
          Sign In
        </button>
      </form>
    </div>
  </div>
{% endblock %}

{% block extra_scripts %}
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  document.getElementById('next').value = params.get('next') || '/';

  document.getElementById('password-toggle').addEventListener('click', function() {
    var inp = document.getElementById('password');
    var icon = this.querySelector('iconify-icon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.setAttribute('icon', 'mdi:eye-off');
    } else {
      inp.type = 'password';
      icon.setAttribute('icon', 'mdi:eye');
    }
  });

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var errorEl = document.getElementById('login-error');
    var emailError = document.getElementById('email-error');
    var passwordError = document.getElementById('password-error');
    errorEl.classList.add('hidden');
    emailError.classList.add('hidden');
    passwordError.classList.add('hidden');

    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;

    if (!email) {
      emailError.textContent = 'Email is required';
      emailError.classList.remove('hidden');
      return;
    }
    if (!password) {
      passwordError.textContent = 'Password is required';
      passwordError.classList.remove('hidden');
      return;
    }

    try {
      var res = await fetch('/api/v1/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          email: email,
          password: password,
        }),
      });
      if (res.ok) {
        window.location.href = document.getElementById('next').value;
      } else {
        var data = await res.json();
        errorEl.textContent = data.error || 'Login failed';
        errorEl.classList.remove('hidden');
      }
    } catch (err) {
      errorEl.textContent = 'Network error';
      errorEl.classList.remove('hidden');
    }
  });
})();
</script>
{% endblock %}
