{% extends "base.html" %}

{% block content %}
<div class="flex justify-center">
  <div class="w-full max-w-xl">

    <h2 class="text-xl font-semibold mb-6">Profile</h2>

    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg">
      <div class="p-4 pb-0">
        <form id="profile-form" hx-boost="false">
          <div class="mb-4">
            <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Name</label>
            <input type="text" name="name" value="{{ current_user.name }}" required
                   class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
          </div>
          <div class="mb-4">
            <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Email</label>
            <input type="email" name="email" value="{{ current_user.email }}" required
                   class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
          </div>
          <div class="mb-4">
            <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">New Password</label>
            <input type="password" name="password" placeholder="Leave blank to keep current"
                   class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
          </div>
          <div class="mb-4">
            <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Repeat new password"
                   class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
          </div>
          <div id="profile-error" class="hidden mb-4 p-2 rounded text-sm bg-red-900/50 border border-red-700 text-red-400"></div>
          <div id="profile-success" class="hidden mb-4 p-2 rounded text-sm bg-green-900/50 border border-green-700 text-green-400"></div>
        </form>
      </div>
      <div class="border-t border-gray-200 dark:border-gray-800 px-4 py-3 flex items-center gap-3">
        <button type="submit" form="profile-form" class="px-4 py-1.5 rounded text-sm font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors">Save</button>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('profile-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('profile-error');
  const okEl = document.getElementById('profile-success');
  errEl.classList.add('hidden');
  okEl.classList.add('hidden');

  const data = Object.fromEntries(new FormData(e.target).entries());
  if (data.password && data.password !== data.confirm_password) {
    errEl.textContent = 'Passwords do not match';
    errEl.classList.remove('hidden');
    return;
  }
  if (!data.password) {
    delete data.password;
  }
  delete data.confirm_password;

  const res = await fetch('/api/v1/auth/profile', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  });
  if (res.ok) {
    okEl.textContent = 'Profile updated successfully';
    okEl.classList.remove('hidden');
  } else {
    const err = await res.json();
    errEl.textContent = err.error || 'Failed to update profile';
    errEl.classList.remove('hidden');
  }
});
</script>
{% endblock %}
