<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BakPow</title>
<script>
tailwind.config = { darkMode: 'class' };
</script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% block extra_head %}{% endblock %}
</head>
<body class="flex flex-col min-h-screen bg-[var(--body-bg)] text-[var(--body-text)]">
<nav class="navbar relative bg-[var(--surface)] border-b border-[var(--border)] shadow-sm">
  <div class="max-w-7xl mx-auto w-full px-4">
    <div class="flex items-center justify-between h-12">
      <a class="text-lg font-bold text-[var(--body-text)]" href="/">BakPow</a>
      <button id="nav-toggle" class="md:hidden p-2 text-[var(--muted)] hover:text-[var(--body-text)]">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div id="nav-menu" class="hidden md:flex items-center gap-1">
        <a class="px-3 py-1.5 rounded text-sm {% if active_page == 'dashboard' %}text-white bg-[#1f6feb]{% else %}text-[var(--muted)] hover:text-[var(--body-text)] hover:bg-[var(--hover)]{% endif %}" href="/">Dashboard</a>
        <a class="px-3 py-1.5 rounded text-sm {% if active_page == 'devices' %}text-white bg-[#1f6feb]{% else %}text-[var(--muted)] hover:text-[var(--body-text)] hover:bg-[var(--hover)]{% endif %}" href="/devices">Devices</a>
        <a class="px-3 py-1.5 rounded text-sm {% if active_page == 'sessions' %}text-white bg-[#1f6feb]{% else %}text-[var(--muted)] hover:text-[var(--body-text)] hover:bg-[var(--hover)]{% endif %}" href="/sessions">Sessions</a>
        <a class="px-3 py-1.5 rounded text-sm {% if active_page == 'measurements' %}text-white bg-[#1f6feb]{% else %}text-[var(--muted)] hover:text-[var(--body-text)] hover:bg-[var(--hover)]{% endif %}" href="/measurements">Measurements</a>
        <button class="ml-2 p-1.5 rounded text-[var(--muted)] hover:text-[var(--body-text)] hover:bg-[var(--hover)]" id="theme-toggle" title="Toggle theme">
          <svg id="theme-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path id="theme-path" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
      </div>
    </div>
  </div>
</nav>

<main class="flex-1 px-4 py-4 max-w-7xl mx-auto w-full">
{% block content %}{% endblock %}
</main>

<footer class="border-t border-[var(--border)] bg-[var(--surface)]">
  <div class="px-4 py-3 max-w-7xl mx-auto text-center">
    <small class="text-[var(--muted)] opacity-70">BakPow v0.1</small>
  </div>
</footer>

<div id="confirm-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">
  <div class="bg-[var(--surface)] border border-[var(--border)] rounded-lg shadow-xl p-6 max-w-sm w-full mx-4">
    <h3 class="text-base font-semibold mb-2" id="confirm-title">Confirm</h3>
    <p class="text-sm text-[var(--muted)] mb-5" id="confirm-message">Are you sure?</p>
    <div class="flex justify-end gap-2">
      <button class="px-3 py-1.5 rounded text-sm font-medium border border-[var(--border)] text-[var(--muted)] hover:bg-[var(--hover)] transition-colors" id="confirm-cancel">Cancel</button>
      <button class="px-3 py-1.5 rounded text-sm font-medium bg-[#f85149] text-white hover:bg-[#da3633] transition-colors" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
(function() {
  var html = document.documentElement;
  var path = document.getElementById('theme-path');
  var saved = localStorage.getItem('theme') || 'system';
  var mq = window.matchMedia('(prefers-color-scheme: dark)');

  var moon = 'M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z';
  var sun = 'M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z';
  var monitor = 'M8 21h8m-4-4v4m-7-6a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2H5z';

  function applyTheme(mode) {
    if (mode === 'dark') {
      html.classList.add('dark');
      if (path) path.setAttribute('d', moon);
    } else if (mode === 'light') {
      html.classList.remove('dark');
      if (path) path.setAttribute('d', sun);
    } else {
      if (mq.matches) {
        html.classList.add('dark');
      } else {
        html.classList.remove('dark');
      }
      if (path) path.setAttribute('d', monitor);
    }
  }

  function nextMode(mode) {
    var modes = ['system', 'dark', 'light'];
    var idx = modes.indexOf(mode);
    return modes[(idx + 1) % modes.length];
  }

  applyTheme(saved);

  if (saved === 'system') {
    mq.addEventListener('change', function() { applyTheme('system'); });
  }

  var toggle = document.getElementById('theme-toggle');
  if (toggle) {
    toggle.addEventListener('click', function() {
      var current = localStorage.getItem('theme') || 'system';
      var next = nextMode(current);
      localStorage.setItem('theme', next);
      applyTheme(next);
      if (next === 'system') {
        mq.addEventListener('change', function() { applyTheme('system'); });
      }
    });
  }

  var navToggle = document.getElementById('nav-toggle');
  var navMenu = document.getElementById('nav-menu');
  if (navToggle && navMenu) {
    navToggle.addEventListener('click', function() {
      navMenu.classList.toggle('hidden');
    });
  }
})();

function confirmDialog(msg) {
  return new Promise(function(resolve) {
    var modal = document.getElementById('confirm-modal');
    document.getElementById('confirm-message').textContent = msg;
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    function cleanup() {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      document.getElementById('confirm-ok').removeEventListener('click', onOk);
      document.getElementById('confirm-cancel').removeEventListener('click', onCancel);
    }
    function onOk() { cleanup(); resolve(true); }
    function onCancel() { cleanup(); resolve(false); }
    document.getElementById('confirm-ok').addEventListener('click', onOk);
    document.getElementById('confirm-cancel').addEventListener('click', onCancel);
  });
}
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
