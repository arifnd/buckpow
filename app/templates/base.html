<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerDash</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% block extra_head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary mb-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">PowerDash</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_page == 'devices' %}active{% endif %}" href="/devices">Devices</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_page == 'sessions' %}active{% endif %}" href="/sessions">Sessions</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_page == 'measurements' %}active{% endif %}" href="/measurements">Measurements</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <button class="nav-link btn btn-link border-0" id="theme-toggle" title="Toggle theme">
            <span id="theme-icon">🌙</span>
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container-fluid px-4">
{% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
(function() {
  const html = document.documentElement;
  const icon = document.getElementById('theme-icon');
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    html.setAttribute('data-bs-theme', 'light');
    icon.textContent = '☀️';
  }
  document.getElementById('theme-toggle').addEventListener('click', function() {
    const current = html.getAttribute('data-bs-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-bs-theme', next);
    icon.textContent = next === 'dark' ? '🌙' : '☀️';
    localStorage.setItem('theme', next);
  });
})();
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
