<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BakPow</title>
<script>
tailwind.config = { darkMode: 'class' };
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script>htmx.config.scriptsToEval = true;</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.1.0/dist/iconify-icon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flowbite-datepicker@1.3.1/dist/js/datepicker.min.js"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flowbite-datepicker@1.3.1/dist/css/datepicker.min.css">
{% block extra_head %}{% endblock %}
<script>
function confirmDialog(msg) {
  return new Promise(function(resolve) {
    var modal = document.getElementById('confirm-modal');
    document.getElementById('confirm-message').textContent = msg;
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    function cleanup() {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      document.getElementById('confirm-ok').removeEventListener('click', onOk);
      document.getElementById('confirm-cancel').removeEventListener('click', onCancel);
    }
    function onOk() { cleanup(); resolve(true); }
    function onCancel() { cleanup(); resolve(false); }
    document.getElementById('confirm-ok').addEventListener('click', onOk);
    document.getElementById('confirm-cancel').addEventListener('click', onCancel);
  });
}
</script>
</head>
<body hx-boost="true" class="flex flex-col min-h-screen bg-[var(--body-bg)] text-[var(--body-text)]">
<nav class="navbar relative bg-[var(--surface)] border-b border-[var(--border)] shadow-sm">
  <div class="max-w-7xl mx-auto w-full px-4">
    <div class="flex items-center justify-between h-12">
      <a class="text-lg font-bold text-[var(--body-text)]" href="/">BakPow</a>
      <button id="nav-toggle" class="md:hidden p-2 text-[var(--muted)] hover:text-[var(--body-text)]">
        <iconify-icon class="w-5 h-5" icon="heroicons-outline:bars-3"></iconify-icon>
      </button>
      <div id="nav-menu" class="hidden md:flex items-center gap-1">
        <a class="px-3 py-1.5 rounded text-sm {% if active_page == 'dashboard' %}text-white bg-[#1f6feb]{% else %}text-[var(--muted)] hover:text-[var(--body-text)] hover:bg-[var(--hover)]{% endif %}" href="/">Dashboard</a>
        <a class="px-3 py-1.5 rounded text-sm {% if active_page == 'devices' %}text-white bg-[#1f6feb]{% else %}text-[var(--muted)] hover:text-[var(--body-text)] hover:bg-[var(--hover)]{% endif %}" href="/devices">Devices</a>
        <a class="px-3 py-1.5 rounded text-sm {% if active_page == 'sessions' %}text-white bg-[#1f6feb]{% else %}text-[var(--muted)] hover:text-[var(--body-text)] hover:bg-[var(--hover)]{% endif %}" href="/sessions">Sessions</a>
        <a class="px-3 py-1.5 rounded text-sm {% if active_page == 'measurements' %}text-white bg-[#1f6feb]{% else %}text-[var(--muted)] hover:text-[var(--body-text)] hover:bg-[var(--hover)]{% endif %}" href="/measurements">Measurements</a>
        <button class="ml-2 p-1.5 rounded text-[var(--muted)] hover:text-[var(--body-text)] hover:bg-[var(--hover)]" id="theme-toggle" title="Toggle theme">
          <iconify-icon id="theme-icon" class="w-4 h-4" icon="heroicons-outline:moon"></iconify-icon>
        </button>
      </div>
    </div>
  </div>
</nav>

<main class="flex-1 px-4 py-4 max-w-7xl mx-auto w-full">
    <div id="main-content">
{% block content %}{% endblock %}
{% block extra_scripts %}{% endblock %}
</div>
</main>

<footer class="border-t border-[var(--border)] bg-[var(--surface)]">
  <div class="px-4 py-3 max-w-7xl mx-auto text-center">
    <small class="text-[var(--muted)] opacity-70">BakPow v0.1</small>
  </div>
</footer>

<div id="confirm-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">
  <div class="bg-[var(--surface)] border border-[var(--border)] rounded-lg shadow-xl p-6 max-w-sm w-full mx-4">
    <h3 class="text-base font-semibold mb-2" id="confirm-title">Confirm</h3>
    <p class="text-sm text-[var(--muted)] mb-5" id="confirm-message">Are you sure?</p>
    <div class="flex justify-end gap-2">
      <button class="px-3 py-1.5 rounded text-sm font-medium bg-gray-600 text-white hover:bg-gray-500 transition-colors" id="confirm-cancel">Cancel</button>
      <button class="px-3 py-1.5 rounded text-sm font-medium bg-red-600 text-white hover:bg-red-500 transition-colors" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

</body>
</html>
