<div id="confirm-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">
  <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg shadow-xl p-6 max-w-sm w-full mx-4">
    <h3 class="text-base font-semibold mb-2" id="confirm-title">Confirm</h3>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-5" id="confirm-message">Are you sure?</p>
    <div class="flex justify-end gap-2">
      <button class="px-3 py-1.5 rounded text-sm font-medium bg-gray-600 text-white hover:bg-gray-500 transition-colors" id="confirm-cancel">Cancel</button>
      <button class="px-3 py-1.5 rounded text-sm font-medium bg-red-600 text-white hover:bg-red-500 transition-colors" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>
