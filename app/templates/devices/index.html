{% extends "base.html" %}

{% block content %}
<div class="flex justify-between items-center mb-4">
  <h2 class="text-xl font-semibold">Devices</h2>
  <button class="inline-flex items-center px-3 py-1.5 rounded text-sm font-medium bg-[#1f6feb] text-white hover:bg-[#388bfd] transition-colors" id="add-device-btn">Add Device</button>
</div>

<div class="bg-[var(--surface)] border border-[var(--border)] rounded-lg overflow-hidden">
  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-[var(--border)] text-[var(--muted)]">
          <th class="text-left py-2 px-3 font-medium">ID</th>
          <th class="text-left py-2 px-3 font-medium">Device ID</th>
          <th class="text-left py-2 px-3 font-medium">Alias</th>
          <th class="text-left py-2 px-3 font-medium">Description</th>
          <th class="text-right py-2 px-3 font-medium">Interval</th>
          <th class="text-center py-2 px-3 font-medium">Status</th>
          <th class="text-left py-2 px-3 font-medium">Last Seen</th>
          <th class="text-right py-2 px-3 font-medium">Actions</th>
        </tr>
      </thead>
      <tbody id="devices-body"></tbody>
    </table>
  </div>
</div>

<div id="device-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">
  <div class="bg-[var(--surface)] border border-[var(--border)] rounded-lg shadow-xl p-6 max-w-lg w-full mx-4">
    <h3 class="text-base font-semibold mb-4" id="device-modal-title">Add Device</h3>
    <form id="device-form">
      <input type="hidden" name="id" id="device-id">
      <div class="mb-4">
        <label class="block text-sm text-[var(--muted)] mb-1">Device ID</label>
        <input type="text" name="device_id" id="field-device-id" required
               class="w-full px-3 py-1.5 rounded text-sm bg-[var(--body-bg)] border border-[#30363d] text-[var(--body-text)] focus:outline-none focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff]">
        <p class="text-xs text-[var(--muted)] mt-1">Permanent identifier matches the ESP32 firmware.</p>
      </div>
      <div class="mb-4">
        <label class="block text-sm text-[var(--muted)] mb-1">Alias</label>
        <input type="text" name="alias" id="field-alias"
               class="w-full px-3 py-1.5 rounded text-sm bg-[var(--body-bg)] border border-[#30363d] text-[var(--body-text)] focus:outline-none focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff]">
      </div>
      <div class="mb-4">
        <label class="block text-sm text-[var(--muted)] mb-1">Description</label>
        <textarea name="description" id="field-description" rows="2"
                  class="w-full px-3 py-1.5 rounded text-sm bg-[var(--body-bg)] border border-[#30363d] text-[var(--body-text)] focus:outline-none focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff]"></textarea>
      </div>
      <div class="mb-4">
        <label class="block text-sm text-[var(--muted)] mb-1">Sampling Interval (seconds)</label>
        <input type="number" name="sampling_interval" id="field-interval" value="1" min="1"
               class="w-full px-3 py-1.5 rounded text-sm bg-[var(--body-bg)] border border-[#30363d] text-[var(--body-text)] focus:outline-none focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff]">
      </div>
      <div class="flex justify-end gap-2">
        <button type="button" class="px-4 py-1.5 rounded text-sm font-medium border border-[var(--border)] text-[var(--muted)] hover:bg-[var(--hover)] transition-colors" id="device-modal-cancel">Cancel</button>
        <button type="submit" class="px-4 py-1.5 rounded text-sm font-medium bg-[#1f6feb] text-white hover:bg-[#388bfd] transition-colors">Save</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let editingDeviceId = null;

async function loadDevices() {
  const res = await fetch('/api/v1/devices');
  const devices = await res.json();
  const tbody = document.getElementById('devices-body');
  tbody.innerHTML = devices.map(d => {
    const status = d.status || 'offline';
    const badge = status === 'online' ? 'bg-[#3fb950]' : 'bg-[#8b949e]';
    return `<tr class="border-b border-[var(--border)] hover:bg-[var(--hover)]">
      <td class="py-2 px-3">${d.id}</td>
      <td class="py-2 px-3"><code class="text-[#58a6ff]">${d.device_id}</code></td>
      <td class="py-2 px-3">${d.alias || '—'}</td>
      <td class="py-2 px-3">${d.description || '—'}</td>
      <td class="py-2 px-3 text-right">${d.sampling_interval}s</td>
      <td class="py-2 px-3 text-center"><span class="inline-flex items-center px-2 py-0.5 rounded-full text-sm font-medium text-white ${badge}">${status}</span></td>
      <td class="py-2 px-3">${d.last_seen ? new Date(d.last_seen).toLocaleString() : '—'}</td>
      <td class="py-2 px-3 text-right">
        <button class="inline-flex items-center px-2 py-1 rounded text-xs font-medium border border-[#30363d] text-[#c9d1d9] hover:bg-[#30363d] transition-colors" onclick="openDeviceModal(${d.id})">Edit</button>
        <button class="inline-flex items-center px-2 py-1 rounded text-xs font-medium border border-[#30363d] text-[#f85149] hover:bg-[#30363d] transition-colors ml-1" onclick="deleteDevice(${d.id})">Delete</button>
      </td>
    </tr>`;
  }).join('');
}

function showDeviceModal() {
  const modal = document.getElementById('device-modal');
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}

function hideDeviceModal() {
  const modal = document.getElementById('device-modal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}

async function openDeviceModal(id) {
  editingDeviceId = id;
  document.getElementById('device-modal-title').textContent = 'Edit Device';
  const res = await fetch('/api/v1/devices/' + id);
  const d = await res.json();
  document.getElementById('device-id').value = d.id;
  document.getElementById('field-device-id').value = d.device_id;
  document.getElementById('field-device-id').setAttribute('readonly', true);
  document.getElementById('field-alias').value = d.alias || '';
  document.getElementById('field-description').value = d.description || '';
  document.getElementById('field-interval').value = d.sampling_interval;
  showDeviceModal();
}

async function deleteDevice(id) {
  if (!await confirmDialog('Delete this device?')) return;
  await fetch('/api/v1/devices/' + id, { method: 'DELETE' });
  loadDevices();
}

function initDevices() {
  loadDevices();
  document.getElementById('add-device-btn').addEventListener('click', () => {
    editingDeviceId = null;
    document.getElementById('device-modal-title').textContent = 'Add Device';
    document.getElementById('device-form').reset();
    document.getElementById('device-id').value = '';
    document.getElementById('field-device-id').removeAttribute('readonly');
    document.getElementById('field-device-id').value = '';
    document.getElementById('field-interval').value = 1;
    showDeviceModal();
  });
  document.getElementById('device-modal-cancel').addEventListener('click', hideDeviceModal);
  document.getElementById('device-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      device_id: document.getElementById('field-device-id').value,
      alias: document.getElementById('field-alias').value,
      description: document.getElementById('field-description').value,
      sampling_interval: parseInt(document.getElementById('field-interval').value),
    };
    let res;
    if (editingDeviceId) {
      res = await fetch('/api/v1/devices/' + editingDeviceId, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data),
      });
    } else {
      res = await fetch('/api/v1/devices', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data),
      });
    }
    if (res.ok) {
      hideDeviceModal();
      loadDevices();
    } else {
      const err = await res.json();
      alert('Error: ' + (err.error || 'Unknown error'));
    }
  });
}

initDevices();
</script>
{% endblock %}
