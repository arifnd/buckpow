{% extends "base.html" %}

{% block content %}
<h2 class="text-xl font-semibold mb-4">{% if device %}Edit Node{% else %}Add Node{% endif %}</h2>

<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg p-4">
  <form id="device-form" class="max-w-lg" hx-boost="false">
    <div class="mb-4">
      <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Node ID</label>
      <input type="text" name="device_id" value="{{ device.device_id if device else '' }}"
             {% if device %}readonly{% endif %} required
             class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
      <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Permanent identifier matches the ESP32 firmware.</p>
    </div>
    <div class="mb-4">
      <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Alias</label>
      <input type="text" name="alias" value="{{ device.alias if device else '' }}"
             class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
    </div>
    <div class="mb-4">
      <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Description</label>
      <textarea name="description" rows="2"
                class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">{{ device.description if device else '' }}</textarea>
    </div>
    <div class="mb-4">
      <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Sampling Interval (seconds)</label>
      <input type="number" name="sampling_interval" value="{{ device.sampling_interval if device else 1 }}" min="1"
             class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
    </div>
    <div class="mb-4">
      <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Firmware Version</label>
      <input type="text" name="firmware_version" value="{{ device.firmware_version if device else '' }}"
             class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
    </div>
    <div class="mb-4">
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="enabled" value="true"
               {% if device is none or device.enabled %}checked{% endif %}
               class="w-4 h-4 rounded border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-950 text-blue-600 focus:ring-blue-400">
        <span class="text-sm text-gray-500 dark:text-gray-400">Enabled</span>
      </label>
    </div>
    <div class="mb-4 p-3 rounded border border-gray-300 dark:border-gray-700">
      <p class="text-xs font-medium text-gray-500 dark:text-gray-400 mb-2">Alert Thresholds (leave empty for global defaults)</p>
      <div class="grid grid-cols-3 gap-2">
        <div>
          <label class="block text-xs text-gray-500 dark:text-gray-400 mb-0.5">High Current (A)</label>
          <input type="number" name="high_current_threshold" value="{{ device.high_current_threshold if device and device.high_current_threshold is not none else '' }}" step="0.01" min="0"
                 class="w-full px-2 py-1 rounded text-xs bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
        </div>
        <div>
          <label class="block text-xs text-gray-500 dark:text-gray-400 mb-0.5">High Power (W)</label>
          <input type="number" name="high_power_threshold" value="{{ device.high_power_threshold if device and device.high_power_threshold is not none else '' }}" step="0.01" min="0"
                 class="w-full px-2 py-1 rounded text-xs bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
        </div>
        <div>
          <label class="block text-xs text-gray-500 dark:text-gray-400 mb-0.5">Low Voltage (V)</label>
          <input type="number" name="low_voltage_threshold" value="{{ device.low_voltage_threshold if device and device.low_voltage_threshold is not none else '' }}" step="0.01" min="0"
                 class="w-full px-2 py-1 rounded text-xs bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
        </div>
      </div>
    </div>
    <div class="mb-4">
      <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Project</label>
      <select name="project_id"
              class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
        <option value="">No project</option>
        {% for p in projects %}
        <option value="{{ p.id }}" {% if device and device.project_id == p.id %}selected{% endif %}>{{ p.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="flex gap-2">
      <button type="submit" class="px-4 py-1.5 rounded text-sm font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors">Save</button>
      <a href="/devices" class="inline-flex items-center px-4 py-1.5 rounded text-sm font-medium bg-gray-600 text-white hover:bg-gray-500 transition-colors">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('device-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const data = Object.fromEntries(new FormData(form).entries());
  data.sampling_interval = parseInt(data.sampling_interval);
  data.high_current_threshold = data.high_current_threshold ? parseFloat(data.high_current_threshold) : null;
  data.high_power_threshold = data.high_power_threshold ? parseFloat(data.high_power_threshold) : null;
  data.low_voltage_threshold = data.low_voltage_threshold ? parseFloat(data.low_voltage_threshold) : null;

  {% if device %}
  const res = await fetch('/api/v1/devices/{{ device.id }}', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  });
  {% else %}
  const res = await fetch('/api/v1/devices', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  });
  {% endif %}

  if (res.ok) {
    htmx.ajax('GET', '/devices', { target: '#main-content', pushUrl: true, select: '#main-content' });
  } else {
    const err = await res.json();
    alert('Error: ' + (err.error || 'Unknown error'));
  }
});
</script>
{% endblock %}
