{% extends "base.html" %}

{% block content %}
<h2 class="text-xl font-semibold mb-4">{% if device %}Edit Device{% else %}Add Device{% endif %}</h2>

<div class="bg-[var(--surface)] border border-[var(--border)] rounded-lg p-4">
  <form id="device-form" class="max-w-lg" hx-boost="false">
    <div class="mb-4">
      <label class="block text-sm text-[var(--muted)] mb-1">Device ID</label>
      <input type="text" name="device_id" value="{{ device.device_id if device else '' }}"
             {% if device %}readonly{% endif %} required
             class="w-full px-3 py-1.5 rounded text-sm bg-[var(--body-bg)] border border-[#30363d] text-[#c9d1d9] focus:outline-none focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff]">
      <p class="text-xs text-[var(--muted)] mt-1">Permanent identifier matches the ESP32 firmware.</p>
    </div>
    <div class="mb-4">
      <label class="block text-sm text-[var(--muted)] mb-1">Alias</label>
      <input type="text" name="alias" value="{{ device.alias if device else '' }}"
             class="w-full px-3 py-1.5 rounded text-sm bg-[var(--body-bg)] border border-[#30363d] text-[#c9d1d9] focus:outline-none focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff]">
    </div>
    <div class="mb-4">
      <label class="block text-sm text-[var(--muted)] mb-1">Description</label>
      <textarea name="description" rows="2"
                class="w-full px-3 py-1.5 rounded text-sm bg-[var(--body-bg)] border border-[#30363d] text-[#c9d1d9] focus:outline-none focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff]">{{ device.description if device else '' }}</textarea>
    </div>
    <div class="mb-4">
      <label class="block text-sm text-[var(--muted)] mb-1">Sampling Interval (seconds)</label>
      <input type="number" name="sampling_interval" value="{{ device.sampling_interval if device else 1 }}" min="1"
             class="w-full px-3 py-1.5 rounded text-sm bg-[var(--body-bg)] border border-[#30363d] text-[#c9d1d9] focus:outline-none focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff]">
    </div>
    <div class="mb-4">
      <label class="block text-sm text-[var(--muted)] mb-1">Project</label>
      <select name="project_id"
              class="w-full px-3 py-1.5 rounded text-sm bg-[var(--body-bg)] border border-[#30363d] text-[#c9d1d9] focus:outline-none focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff]">
        <option value="">No project</option>
        {% for p in projects %}
        <option value="{{ p.id }}" {% if device and device.project_id == p.id %}selected{% endif %}>{{ p.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="flex gap-2">
      <button type="submit" class="px-4 py-1.5 rounded text-sm font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors">Save</button>
      <a href="/devices" class="inline-flex items-center px-4 py-1.5 rounded text-sm font-medium bg-gray-600 text-white hover:bg-gray-500 transition-colors">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('device-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const data = Object.fromEntries(new FormData(form).entries());
  data.sampling_interval = parseInt(data.sampling_interval);

  {% if device %}
  const res = await fetch('/api/v1/devices/{{ device.id }}', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  });
  {% else %}
  const res = await fetch('/api/v1/devices', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  });
  {% endif %}

  if (res.ok) {
    htmx.ajax('GET', '/devices', { target: '#main-content', pushUrl: true, select: '#main-content' });
  } else {
    const err = await res.json();
    alert('Error: ' + (err.error || 'Unknown error'));
  }
});
</script>
{% endblock %}
