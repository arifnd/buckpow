{% extends "base.html" %}

{% block content %}
<div class="flex justify-center">
  <div class="w-full max-w-xl">

    <h2 class="text-xl font-semibold mb-6">Settings</h2>

    <div class="flex border-b border-gray-200 dark:border-gray-800 mb-4">
      <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-blue-600 text-blue-600 dark:text-blue-400 dark:border-blue-400 -mb-px" data-tab="general">General</button>
      <button class="tab-btn px-4 py-2 text-sm font-medium text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-300 border-b-2 border-transparent" data-tab="alerts">Alert Thresholds</button>
      <button class="tab-btn px-4 py-2 text-sm font-medium text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-300 border-b-2 border-transparent" data-tab="backup">Backup</button>
    </div>

    <div id="tab-general" class="tab-content">
      <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg">
        <div class="p-4 pb-0">
          <div id="status-general" class="hidden mb-3 p-2 rounded text-sm"></div>
          <form id="form-general" class="settings-card-form" data-fields='["brand","timestamp_format","date_format","timezone","device_watchdog_timeout"]'>
            <div class="mb-3">
              <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Brand Title</label>
              <input type="text" name="brand" id="field-brand" placeholder="BuckPow"
                     class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
            </div>
            <div class="mb-3">
              <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Timestamp Format</label>
              <select name="timestamp_format" id="field-timestamp-format"
                       class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
                 <option value="24h">24-hour (14:30:00)</option>
                 <option value="12h">12-hour (2:30:00 PM)</option>
               </select>
             </div>
             <div class="mb-3">
               <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Date Format</label>
               <select name="date_format" id="field-date-format"
                       class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
                 <option value="YYYY-MM-DD">YYYY-MM-DD (2024-01-15)</option>
                 <option value="DD/MM/YYYY">DD/MM/YYYY (15/01/2024)</option>
                 <option value="MM/DD/YYYY">MM/DD/YYYY (01/15/2024)</option>
               </select>
             </div>
             <div class="mb-3">
               <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Timezone</label>
              <select name="timezone" id="field-timezone"
                      class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
                <option value="+0">GMT+0</option>
                <option value="+1">GMT+1</option>
                <option value="+2">GMT+2</option>
                <option value="+3">GMT+3</option>
                <option value="+4">GMT+4</option>
                <option value="+5">GMT+5</option>
                <option value="+6">GMT+6</option>
                <option value="+7">GMT+7</option>
                <option value="+8">GMT+8</option>
                <option value="+9">GMT+9</option>
                <option value="+10">GMT+10</option>
                <option value="+11">GMT+11</option>
                <option value="+12">GMT+12</option>
                <option value="-1">GMT-1</option>
                <option value="-2">GMT-2</option>
                <option value="-3">GMT-3</option>
                <option value="-4">GMT-4</option>
                <option value="-5">GMT-5</option>
                <option value="-6">GMT-6</option>
                <option value="-7">GMT-7</option>
                <option value="-8">GMT-8</option>
                <option value="-9">GMT-9</option>
                <option value="-10">GMT-10</option>
                <option value="-11">GMT-11</option>
                <option value="-12">GMT-12</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Device Watchdog Timeout (s)</label>
              <input type="number" step="1" min="5" max="300" name="device_watchdog_timeout" id="field-device-watchdog-timeout" placeholder="30"
                     class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
              <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Seconds without data before marking device offline (default: 30).</p>
            </div>
          </form>
        </div>
        <div class="border-t border-gray-200 dark:border-gray-800 px-4 py-3 flex items-center gap-3">
          <button type="submit" form="form-general" class="px-4 py-1.5 rounded text-sm font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors">Save</button>
        </div>
      </div>
    </div>

    <div id="tab-alerts" class="tab-content hidden">
      <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg">
        <div class="p-4 pb-0">
          <div id="status-alerts" class="hidden mb-3 p-2 rounded text-sm"></div>
          <p class="text-xs text-gray-500 dark:text-gray-400 mb-3">Leave empty to use global defaults.</p>
          <form id="form-alerts" class="settings-card-form" data-fields='["high_power_threshold","high_current_threshold","low_voltage_threshold"]'>
            <div class="mb-3">
              <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">High Power Threshold (W)</label>
              <input type="number" step="0.1" name="high_power_threshold" id="field-high-power"
                     class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
            </div>
            <div class="mb-3">
              <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">High Current Threshold (A)</label>
              <input type="number" step="0.01" name="high_current_threshold" id="field-high-current"
                     class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
            </div>
            <div class="mb-3">
              <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Low Voltage Threshold (V)</label>
              <input type="number" step="0.1" name="low_voltage_threshold" id="field-low-voltage"
                     class="w-full px-3 py-1.5 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
            </div>
          </form>
        </div>
        <div class="border-t border-gray-200 dark:border-gray-800 px-4 py-3 flex items-center gap-3">
          <button type="submit" form="form-alerts" class="px-4 py-1.5 rounded text-sm font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors">Save</button>
        </div>
      </div>
    </div>

    <div id="tab-backup" class="tab-content hidden">
      <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg">
        <div class="p-4 pb-0">
          <p class="text-xs text-gray-500 dark:text-gray-400 mb-3">Download a copy of the database.</p>
          <div id="db-info" class="hidden mb-3 text-sm text-gray-600 dark:text-gray-400">
            <span class="font-medium">Database:</span> <span id="db-type">—</span>
            <span class="mx-1">·</span>
            <span class="font-medium">Size:</span> <span id="db-size">—</span>
          </div>
          <div id="db-tool-warning" class="hidden mb-3 p-3 rounded bg-yellow-50 dark:bg-yellow-900/20 text-yellow-700 dark:text-yellow-400 text-xs">
            <span id="db-tool-warning-text"></span>
          </div>
        </div>
        <div class="border-t border-gray-200 dark:border-gray-800 px-4 py-3 flex items-center gap-3">
          <a id="backup-link" href="/api/v1/settings/backup" hx-boost="false"
             class="inline-flex items-center px-4 py-1.5 rounded text-sm font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors">
            Download Backup
          </a>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(function(b) {
      b.classList.remove('border-blue-600', 'text-blue-600', 'dark:text-blue-400', 'dark:border-blue-400');
      b.classList.add('border-transparent', 'text-gray-500', 'dark:text-gray-400');
    });
    btn.classList.remove('border-transparent', 'text-gray-500', 'dark:text-gray-400');
    btn.classList.add('border-blue-600', 'text-blue-600', 'dark:text-blue-400', 'dark:border-blue-400');
    document.querySelectorAll('.tab-content').forEach(function(tc) { tc.classList.add('hidden'); });
    document.getElementById('tab-' + btn.getAttribute('data-tab')).classList.remove('hidden');
    if (btn.getAttribute('data-tab') === 'backup') loadDbInfo();
  });
});

function formatBytes(bytes) {
  if (bytes === null || bytes === undefined) return '—';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function loadDbInfo() {
  fetch('/api/v1/settings/db-info')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var infoEl = document.getElementById('db-info');
      infoEl.classList.remove('hidden');
      document.getElementById('db-type').textContent = data.type.charAt(0).toUpperCase() + data.type.slice(1);
      document.getElementById('db-size').textContent = formatBytes(data.size);

      var warningEl = document.getElementById('db-tool-warning');
      if (data.backup_formats.sql_dump && !data.tool_available) {
        warningEl.classList.remove('hidden');
        var tool = data.type === 'postgresql' ? 'pg_dump' : 'mysqldump';
        document.getElementById('db-tool-warning-text').textContent =
          tool + ' is not installed on the server. SQL dump backup is unavailable.';
      }
    });
}

var FIELD_MAP = {
  high_power_threshold: 'field-high-power',
  high_current_threshold: 'field-high-current',
  low_voltage_threshold: 'field-low-voltage',
  brand: 'field-brand',
  timestamp_format: 'field-timestamp-format',
  date_format: 'field-date-format',
  timezone: 'field-timezone',
  device_watchdog_timeout: 'field-device-watchdog-timeout',
};

var FORMS = [
  { id: 'form-alerts', fields: ['high_power_threshold', 'high_current_threshold', 'low_voltage_threshold'], status: 'status-alerts' },
  { id: 'form-general', fields: ['brand', 'timestamp_format', 'date_format', 'timezone', 'device_watchdog_timeout'], status: 'status-general' },
];

function showStatus(el, type, message) {
  el.className = 'mb-3 p-2 rounded text-sm';
  if (type === 'saving') {
    el.classList.add('bg-blue-50', 'dark:bg-blue-900/20', 'text-blue-600', 'dark:text-blue-400');
  } else if (type === 'success') {
    el.classList.add('bg-green-50', 'dark:bg-green-900/20', 'text-green-600', 'dark:text-green-400');
  } else if (type === 'error') {
    el.classList.add('bg-red-50', 'dark:bg-red-900/20', 'text-red-600', 'dark:text-red-400');
  }
  el.textContent = message;
  el.classList.remove('hidden');
}

function hideStatus(el) {
  el.classList.add('hidden');
  el.className = 'hidden mb-3 p-2 rounded text-sm';
}

function loadSettings() {
  fetch('/api/v1/settings').then(function(r) { return r.json(); }).then(function(s) {
    Object.keys(FIELD_MAP).forEach(function(key) {
      var el = document.getElementById(FIELD_MAP[key]);
      if (!el) return;
      if (s[key] != null) {
        if (el.tagName === 'SELECT') el.value = s[key];
        else el.value = s[key];
      }
    });
  });
}

FORMS.forEach(function(f) {
  var form = document.getElementById(f.id);
  if (!form) return;
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var status = document.getElementById(f.status);
    var data = {};
    f.fields.forEach(function(key) {
      var el = document.getElementById(FIELD_MAP[key]);
      var val = el ? el.value.trim() : '';
      data[key] = val || null;
    });

    showStatus(status, 'saving', 'Saving\u2026');
    fetch('/api/v1/settings', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data),
    }).then(function(r) {
      if (r.ok) {
        showStatus(status, 'success', 'Settings saved successfully');
        setTimeout(function() { hideStatus(status); }, 2000);
      } else {
        r.json().then(function(err) {
          showStatus(status, 'error', 'Error: ' + (err.error || 'Unknown'));
        });
      }
    });
  });
});

loadSettings();
</script>
{% endblock %}
