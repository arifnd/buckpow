{% extends "base.html" %}
{% block content %}
<div class="flex justify-between items-center mb-4">
  <h2 class="text-xl font-semibold">Alerts</h2>
  <div class="flex items-center gap-3">
    <span class="text-sm text-gray-500 dark:text-gray-400" id="unresolved-count"></span>
    <button class="px-3 py-1.5 rounded text-sm font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors" onclick="resolveAllAlerts()">Resolve All</button>
  </div>
</div>

<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg">
  <div class="flex flex-wrap gap-2 p-3 border-b border-gray-200 dark:border-gray-800">
    <select id="filter-level" class="px-2 py-1 rounded text-xs bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300" onchange="loadAlerts()">
      <option value="">All Levels</option>
      <option value="info">Info</option>
      <option value="warning">Warning</option>
      <option value="critical">Critical</option>
    </select>
    <select id="filter-resolved" class="px-2 py-1 rounded text-xs bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300" onchange="loadAlerts()">
      <option value="">All Status</option>
      <option value="false">Unresolved</option>
      <option value="true">Resolved</option>
    </select>
  </div>
  <div class="">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-gray-200 dark:border-gray-800 text-gray-500 dark:text-gray-400">
          <th class="text-left py-2 px-3 font-medium">Level</th>
          <th class="text-left py-2 px-3 font-medium">Device</th>
          <th class="text-left py-2 px-3 font-medium">Message</th>
          <th class="text-left py-2 px-3 font-medium">Created</th>
          <th class="text-left py-2 px-3 font-medium">Resolved</th>
          <th class="text-right py-2 px-3 font-medium">Actions</th>
        </tr>
      </thead>
      <tbody id="alerts-tbody"></tbody>
    </table>
  </div>
  <nav class="mt-4 pb-4" id="pagination-wrap">
    <ul class="flex items-center justify-center gap-1" id="alerts-pagination"></ul>
  </nav>
</div>

<script>
let currentPage = 1;

function levelBadge(level) {
  var colors = { info: 'bg-blue-400', warning: 'bg-yellow-600', critical: 'bg-red-500' };
  return '<span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-xs font-medium text-white ' + (colors[level] || 'bg-gray-400') + '">' + level + '</span>';
}

function loadAlerts(page) {
  if (page !== undefined) currentPage = page;
  var level = document.getElementById('filter-level').value;
  var resolved = document.getElementById('filter-resolved').value;
  var url = '/api/v1/alerts?page=' + currentPage + '&per_page=10';
  if (level) url += '&level=' + level;
  if (resolved !== '') url += '&resolved=' + resolved;
  fetch(url).then(function(r) { return r.json(); }).then(function(data) {
    var tbody = document.getElementById('alerts-tbody');
    tbody.innerHTML = '';
    if (data.alerts.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="py-8 text-center text-gray-500 dark:text-gray-400">No alerts found.</td></tr>';
    } else {
      data.alerts.forEach(function(a) {
        var resolved = a.resolved_at ? new Date(a.resolved_at).toLocaleString() : '<span class="text-gray-500 dark:text-gray-400">—</span>';
        var actions = a.resolved_at ? '' : '<button class="px-2 py-1 rounded text-xs font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors" onclick="resolveAlert(' + a.id + ')">Resolve</button>';
        tbody.innerHTML += '<tr class="border-b border-gray-200 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-900">' +
          '<td class="py-2 px-3">' + levelBadge(a.level) + '</td>' +
          '<td class="py-2 px-3 text-blue-500 dark:text-blue-400">' + (a.device_name || '—') + '</td>' +
          '<td class="py-2 px-3">' + a.message + '</td>' +
          '<td class="py-2 px-3 text-gray-500 dark:text-gray-400">' + (a.created_at ? new Date(a.created_at).toLocaleString() : '—') + '</td>' +
          '<td class="py-2 px-3 text-gray-500 dark:text-gray-400">' + resolved + '</td>' +
          '<td class="py-2 px-3 text-right">' + actions + '</td>' +
          '</tr>';
      });
    }
    document.getElementById('unresolved-count').textContent = data.unresolved_count + ' unresolved';
    renderPagination(data.page, data.pages);
  });
}

function renderPagination(p, total) {
  var wrap = document.getElementById('pagination-wrap');
  wrap.style.display = total <= 1 ? 'none' : '';
  var html = '<li><a class="flex items-center justify-center w-7 h-7 rounded text-xs ' + (p <= 1 ? 'text-gray-500 pointer-events-none' : 'text-gray-900 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800') + ' border border-gray-300 dark:border-gray-700 transition-colors" href="#" onclick="loadAlerts(' + (p - 1) + '); return false;">&laquo;</a></li>';
  var pages = new Set([1, total]);
  for (var i = Math.max(2, p - 2); i <= Math.min(total - 1, p + 2); i++) pages.add(i);
  [...pages].sort(function(a, b) { return a - b; }).forEach(function(n, i, arr) {
    if (i > 0 && n - arr[i - 1] > 1) html += '<li><span class="flex items-center justify-center w-7 h-7 text-xs text-gray-500">&hellip;</span></li>';
    html += '<li><a class="flex items-center justify-center w-7 h-7 rounded text-xs border border-gray-300 dark:border-gray-700 transition-colors ' + (n === p ? 'bg-blue-600 border-blue-600 text-white' : 'text-gray-900 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800') + '" href="#" onclick="loadAlerts(' + n + '); return false;">' + n + '</a></li>';
  });
  html += '<li><a class="flex items-center justify-center w-7 h-7 rounded text-xs ' + (p >= total ? 'text-gray-500 pointer-events-none' : 'text-gray-900 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800') + ' border border-gray-300 dark:border-gray-700 transition-colors" href="#" onclick="loadAlerts(' + (p + 1) + '); return false;">&raquo;</a></li>';
  document.getElementById('alerts-pagination').innerHTML = html;
}

function resolveAlert(id) {
  fetch('/api/v1/alerts/' + id + '/resolve', { method: 'PATCH' }).then(function() { loadAlerts(); });
}

function resolveAllAlerts() {
  fetch('/api/v1/alerts/resolve-all', { method: 'POST' }).then(function() { loadAlerts(); });
}

loadAlerts(1);
</script>
{% endblock %}
