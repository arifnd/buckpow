{% extends "base.html" %}

{% block content %}
<div class="flex justify-between items-center mb-4">
  <h2 class="text-xl font-semibold">Audit Log</h2>
  <span class="text-sm text-gray-500 dark:text-gray-400" id="log-count"></span>
</div>

<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg">
  <div class="flex flex-wrap gap-2 p-3 border-b border-gray-200 dark:border-gray-800">
    <select id="filter-action" class="px-2 py-1 rounded text-xs bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300" onchange="loadLogs()">
      <option value="">All Actions</option>
    </select>
    <select id="filter-target" class="px-2 py-1 rounded text-xs bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300" onchange="loadLogs()">
      <option value="">All Types</option>
      <option value="device">Device</option>
      <option value="project">Project</option>
      <option value="session">Session</option>
      <option value="user">User</option>
      <option value="export">Export</option>
    </select>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-gray-200 dark:border-gray-800 text-gray-500 dark:text-gray-400">
          <th class="text-left py-2 px-3 font-medium">Time</th>
          <th class="text-left py-2 px-3 font-medium">User</th>
          <th class="text-left py-2 px-3 font-medium">Action</th>
          <th class="text-left py-2 px-3 font-medium">Target</th>
          <th class="text-left py-2 px-3 font-medium">Details</th>
          <th class="text-right py-2 px-3 font-medium">IP</th>
        </tr>
      </thead>
      <tbody id="logs-tbody"></tbody>
    </table>
  </div>
  <nav class="mt-4 pb-4" id="pagination-wrap">
    <ul class="flex items-center justify-center gap-1" id="logs-pagination"></ul>
  </nav>
</div>

<script>
let currentPage = 1;

function loadLogs() {
  var page = currentPage;
  var action = document.getElementById('filter-action').value;
  var target = document.getElementById('filter-target').value;
  var url = '/api/v1/audit/logs?page=' + page + '&per_page=10';
  if (action) url += '&action=' + encodeURIComponent(action);
  if (target) url += '&target_type=' + encodeURIComponent(target);
  fetch(url).then(function(r) { return r.json(); }).then(function(d) {
    var tbody = document.getElementById('logs-tbody');
    tbody.innerHTML = '';
    d.logs.forEach(function(l) {
      var details = l.details ? JSON.stringify(l.details) : '';
      var targetStr = l.target_type ? (l.target_type + (l.target_id ? ' #' + l.target_id : '')) : '—';
      tbody.innerHTML += '<tr class="border-b border-gray-200 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-900">' +
        '<td class="py-2 px-3 whitespace-nowrap text-gray-500 dark:text-gray-400">' + (l.created_at ? l.created_at.replace('T', ' ').replace(/\.\d+Z/, '') : '') + '</td>' +
        '<td class="py-2 px-3">' + (l.user_name || '—') + '</td>' +
        '<td class="py-2 px-3 font-medium">' + l.action + '</td>' +
        '<td class="py-2 px-3 text-gray-500 dark:text-gray-400">' + targetStr + '</td>' +
        '<td class="py-2 px-3 text-gray-500 dark:text-gray-400 max-w-[200px] truncate">' + details + '</td>' +
        '<td class="py-2 px-3 text-right text-gray-500 dark:text-gray-400 text-xs">' + (l.ip_address || '') + '</td>' +
        '</tr>';
    });
    if (d.logs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="py-8 text-center text-gray-500 dark:text-gray-400">No audit logs found</td></tr>';
    }
    document.getElementById('log-count').textContent = d.total + ' entries';
    renderPagination(d.page, d.pages);
    populateActionFilter(d.actions);
  });
}

function renderPagination(p, total) {
  var wrap = document.getElementById('pagination-wrap');
  wrap.style.display = total <= 1 ? 'none' : '';
  var html = '<li><a class="flex items-center justify-center w-7 h-7 rounded text-xs ' + (p <= 1 ? 'text-gray-500 pointer-events-none' : 'text-gray-900 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800') + ' border border-gray-300 dark:border-gray-700 transition-colors" href="#" onclick="goTo(' + (p - 1) + '); return false;">&laquo;</a></li>';
  var pages = new Set([1, total]);
  for (var i = Math.max(2, p - 2); i <= Math.min(total - 1, p + 2); i++) pages.add(i);
  [...pages].sort(function(a, b) { return a - b; }).forEach(function(n, i, arr) {
    if (i > 0 && n - arr[i - 1] > 1) html += '<li><span class="flex items-center justify-center w-7 h-7 text-xs text-gray-500">&hellip;</span></li>';
    html += '<li><a class="flex items-center justify-center w-7 h-7 rounded text-xs border border-gray-300 dark:border-gray-700 transition-colors ' + (n === p ? 'bg-blue-600 border-blue-600 text-white' : 'text-gray-900 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800') + '" href="#" onclick="goTo(' + n + '); return false;">' + n + '</a></li>';
  });
  html += '<li><a class="flex items-center justify-center w-7 h-7 rounded text-xs ' + (p >= total ? 'text-gray-500 pointer-events-none' : 'text-gray-900 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800') + ' border border-gray-300 dark:border-gray-700 transition-colors" href="#" onclick="goTo(' + (p + 1) + '); return false;">&raquo;</a></li>';
  document.getElementById('logs-pagination').innerHTML = html;
}

function goTo(p) {
  if (p < 1) return;
  currentPage = p;
  loadLogs();
}

function populateActionFilter(actions) {
  var sel = document.getElementById('filter-action');
  var current = sel.value;
  sel.innerHTML = '<option value="">All Actions</option>';
  actions.forEach(function(a) {
    sel.innerHTML += '<option value="' + a + '"' + (a === current ? ' selected' : '') + '>' + a + '</option>';
  });
}

document.addEventListener('DOMContentLoaded', loadLogs);
</script>
{% endblock %}
