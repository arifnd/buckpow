{% extends "base.html" %}

{% block content %}
<h2 class="text-xl font-semibold mb-4">Measurements</h2>

<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg p-4">
  <form class="flex flex-wrap gap-2 mb-4 items-end" id="filter-form">
    <div>
      <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Node</label>
      <select class="px-2 py-1 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400" id="filter-device">
        <option value="">All</option>
      </select>
    </div>
    <div>
      <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Session</label>
      <select class="px-2 py-1 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400" id="filter-session">
        <option value="">All</option>
      </select>
    </div>
    <div class="flex gap-1 items-end">
      <div>
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">From</label>
        <input type="date" class="w-40 px-2 py-1 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400" id="filter-from">
      </div>
      <div>
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">To</label>
        <input type="date" class="w-40 px-2 py-1 rounded text-sm bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-400" id="filter-to">
      </div>
    </div>
    <div class="flex gap-1">
      <button type="submit" class="px-3 py-1.5 rounded text-sm font-medium bg-blue-600 text-white hover:bg-blue-500 transition-colors">Filter</button>
      <button type="button" class="px-3 py-1.5 rounded text-sm font-medium bg-gray-600 text-white hover:bg-gray-500 transition-colors" id="reset-filters">Reset</button>
    </div>
    <div class="ml-auto">
      <button type="button" class="px-3 py-1.5 rounded text-sm font-medium bg-green-600 text-white hover:bg-green-500 transition-colors" id="download-csv">CSV</button>
      <button type="button" class="px-3 py-1.5 rounded text-sm font-medium bg-emerald-700 text-white hover:bg-emerald-600 transition-colors" id="download-xlsx">XLSX</button>
    </div>
  </form>

  <div class="">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-gray-200 dark:border-gray-800 text-gray-500 dark:text-gray-400">
          <th class="text-left py-2 px-2 font-medium">Node</th>
          <th class="text-left py-2 px-2 font-medium">Session</th>
          <th class="text-right py-2 px-2 font-medium">Voltage</th>
          <th class="text-right py-2 px-2 font-medium">Current</th>
          <th class="text-right py-2 px-2 font-medium">Power</th>
          <th class="text-right py-2 px-2 font-medium">Energy</th>
          <th class="text-left py-2 px-2 font-medium">Timestamp</th>
        </tr>
      </thead>
      <tbody id="measurements-body"></tbody>
    </table>
  </div>

  <nav class="mt-4">
    <ul class="flex items-center justify-center gap-1" id="pagination"></ul>
  </nav>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/measurements.js') }}"></script>
{% endblock %}
